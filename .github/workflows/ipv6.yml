name: Generate operator IPv6 access prefixes

on:
  push:
    branches:
      - ipv6
    paths-ignore:
      - 'data/ipv6/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-operator-ipv6-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      SOURCE_DIR: ${{ github.workspace }}/.tmp/operator-ipv6-sources
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.mod
      - name: Resolve IP2Location release
        id: ip2location
        shell: bash
        run: |
          set -euo pipefail
          tag=$(curl --fail --silent --show-error --location --retry 3 \
            'https://api.github.com/repos/renfei/ip2location/releases/latest' | jq -r '.tag_name')
          test -n "$tag"
          test "$tag" != null
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Cache IP2Location DB11 IPv6
        uses: actions/cache@v5
        with:
          path: ${{ env.SOURCE_DIR }}/IP2LOCATION-LITE-DB11.IPV6.BIN
          key: ip2location-db11-ipv6-${{ steps.ip2location.outputs.tag }}
      - name: Download sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$SOURCE_DIR"
          curl_opts=(--fail --silent --show-error --location --retry 3)
          curl "${curl_opts[@]}" 'https://www.ris.ripe.net/dumps/riswhoisdump.IPv6.gz' -o "$SOURCE_DIR/riswhois-ipv6.gz"
          curl "${curl_opts[@]}" 'https://iptoasn.com/data/ip2asn-v6.tsv.gz' -o "$SOURCE_DIR/ip2asn-v6.tsv.gz"
          curl "${curl_opts[@]}" 'https://ftp.apnic.net/apnic/whois/apnic.db.inet6num.gz' -o "$SOURCE_DIR/apnic.db.inet6num.gz"
          if [[ ! -s "$SOURCE_DIR/IP2LOCATION-LITE-DB11.IPV6.BIN" ]]; then
            curl "${curl_opts[@]}" \
              "https://github.com/renfei/ip2location/releases/download/${{ steps.ip2location.outputs.tag }}/IP2LOCATION-LITE-DB11.IPV6.BIN" \
              -o "$SOURCE_DIR/IP2LOCATION-LITE-DB11.IPV6.BIN"
          fi
      - name: Validate sources
        shell: bash
        run: |
          set -euo pipefail
          test $(stat -c '%s' "$SOURCE_DIR/riswhois-ipv6.gz") -gt 1000000
          test $(stat -c '%s' "$SOURCE_DIR/ip2asn-v6.tsv.gz") -gt 100000
          test $(stat -c '%s' "$SOURCE_DIR/apnic.db.inet6num.gz") -gt 1000000
          test $(stat -c '%s' "$SOURCE_DIR/IP2LOCATION-LITE-DB11.IPV6.BIN") -gt 200000000
      - name: Resolve Go dependencies
        run: go mod tidy
      - name: Test
        run: go test ./...
      - name: Generate operator access prefixes
        shell: bash
        run: |
          go run ./cmd/build6 \
            --ris "$SOURCE_DIR/riswhois-ipv6.gz" \
            --iptoasn "$SOURCE_DIR/ip2asn-v6.tsv.gz" \
            --inet6num "$SOURCE_DIR/apnic.db.inet6num.gz" \
            --operator-config config/operators.json
          test -s data/ipv6/operators/chinatelecom.txt
          test -s data/ipv6/operators/chinamobile.txt
          test -s data/ipv6/operators/chinaunicom.txt
          test -s data/ipv6/manifest.json
      - name: Generate IP2Location province audit
        shell: bash
        run: |
          go run ./cmd/audit6geo \
            --db "$SOURCE_DIR/IP2LOCATION-LITE-DB11.IPV6.BIN" \
            --release-tag '${{ steps.ip2location.outputs.tag }}'
          test -s data/ipv6/audits/ip2location-provinces.json
          test -s data/ipv6/audits/ip2location-provinces.md
          test -d data/ipv6/provinces
      - uses: actions/upload-artifact@v4
        with:
          name: operator-ipv6-access-prefixes
          path: data/ipv6/
      - name: Commit generated lists
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A data/ipv6 go.mod go.sum
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: update operator IPv6 access prefixes'
          git push
