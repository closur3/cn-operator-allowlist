name: Build and audit IPv6 BGP candidates

on:
  push:
    branches:
      - ipv6
    paths-ignore:
      - 'reports/ipv6/**'
      - 'data/ipv6/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-ipv6-allowlist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      SOURCE_DIR: ${{ github.workspace }}/.tmp/cn-eyeball-ipv6-sources
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Download IPv6 audit sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$SOURCE_DIR"
          curl_opts=(--fail --silent --show-error --location --retry 3)
          curl "${curl_opts[@]}" 'https://iptoasn.com/data/ip2asn-v6.tsv.gz' -o "$SOURCE_DIR/ip2asn-v6.tsv.gz"
          curl "${curl_opts[@]}" 'https://www.ris.ripe.net/dumps/riswhoisdump.IPv6.gz' -o "$SOURCE_DIR/riswhois-ipv6.gz"
          du -h "$SOURCE_DIR"/*
      - name: Validate downloaded sources
        shell: bash
        run: |
          set -euo pipefail
          test $(stat -c '%s' "$SOURCE_DIR/ip2asn-v6.tsv.gz") -gt 100000
          test $(stat -c '%s' "$SOURCE_DIR/riswhois-ipv6.gz") -gt 1000000
      - name: Test IPv6 audit code
        run: go test ./...
      - name: Generate exact IPv6 BGP candidates
        shell: bash
        run: |
          go run ./cmd/build6 \
            --iptoasn "$SOURCE_DIR/ip2asn-v6.tsv.gz" \
            --ris "$SOURCE_DIR/riswhois-ipv6.gz" \
            --operator-config config/operators.json
          test -s data/ipv6/operators/chinanet.txt
          test -s data/ipv6/manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: ipv6-bgp-candidate-audit
          path: |
            reports/ipv6/
            data/ipv6/
      - name: Commit IPv6 output and audit
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A reports/ipv6 data/ipv6
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: update IPv6 BGP candidates and audit'
          git push
